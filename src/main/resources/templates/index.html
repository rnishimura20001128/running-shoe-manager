<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Running Shoe Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h1 class="mb-4">🏃‍♂️ ランニングシューズ管理</h1>

    <div class="card card-body mb-4 bg-light">
        <h5>新しいシューズを登録</h5>
        <form th:action="@{/add}" method="post" class="row g-3">
            <div class="col-md-4">
                <input type="text" name="brand" class="form-control" placeholder="ブランド (例: Adidas)" required>
            </div>
            <div class="col-md-4">
                <input type="text" name="modelName" class="form-control" placeholder="モデル名 (例: Adizero SL2)" required>
            </div>
            <div class="col-md-2">
                <input type="number" step="0.1" name="totalDistance" class="form-control" placeholder="距離 (km)">
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100">登録</button>
            </div>
        </form>
    </div>

    <form th:action="@{/}" method="get" class="mb-4">
        <div class="input-group">
            <input type="text" name="search" class="form-control" placeholder="ブランドやモデル名で検索..." th:value="${search}">
            <button class="btn btn-outline-secondary" type="submit">検索</button>
        </div>
    </form>

    <table class="table table-hover">
        <thead class="table-dark">
            <tr>
                <th>ブランド</th>
                <th>モデル名</th>
                <th>走行距離</th>
                <th>状態</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="shoe : ${shoes}">
                <td th:text="${shoe.brand}"></td>
                <td th:text="${shoe.modelName}"></td>
                <td th:text="${shoe.totalDistance} + ' km'"></td>
                <td th:text="${shoe.isActive} ? 'アクティブ' : '上限超過'"></td>
                <td>
                    <button class="btn btn-sm btn-outline-primary" th:data-bs-target="'#detailModal' + ${shoe.id}" data-bs-toggle="modal">
                        詳細
                    </button>
                    <div class="modal fade" th:id="'detailModal' + ${shoe.id}">
                        <div class="modal-dialog modal-xl">
                            <div class="modal-content">
                                <form th:action="@{/update}" method="post">
                                    <input type="hidden" name="id" th:value="${shoe.id}">
                                    <div class="modal-body">
                                        <table>
                                            <tr>
                                                <th>
                                                    ブランド
                                                </th>
                                                <th>
                                                    モデル名
                                                </th>
                                                <th>
                                                    走行距離(km)
                                                </th>
                                                <th>
                                                    状態
                                                </th>
                                                <th>
                                                    購入日
                                                </th>
                                                <th>
                                                    カテゴリ
                                                </th>
                                                <th>
                                                    サイズ(cm)
                                                </th>
                                                <th>
                                                    上限走行距離(km)
                                                </th>
                                                <th>
                                                    プレート有無
                                                </th>
                                                <th>
                                                    メモ
                                                </th>
                                            </tr>
                                            <tr>
                                                <td>
                                                    <input type="text" name="brand" th:value="${shoe.brand}" class="form-control">
                                                </td>
                                                <td>
                                                    <input type="text" name="modelName" th:value="${shoe.modelName}" class="form-control">
                                                </td>
                                                <td>
                                                    <input type="text" name="totalDistance" th:value="${shoe.totalDistance}" class="form-control">
                                                </td>
                                                <td>
                                                    <input type="checkbox" name="isActive" th:checked="${shoe.isActive}" class="form-check-input">
                                                    <input type="hidden" name="_isActive" value="on">
                                                </td>
                                                <td>
                                                    <input type="text" name="purchasedAt" th:value="${shoe.purchasedAt}" class="form-control">
                                                </td>
                                                <td>
                                                    <input type="text" name="category" th:value="${shoe.category}" class="form-control">
                                                </td>
                                                <td>
                                                    <input type="text" name="size" th:value="${shoe.size}" class="form-control">
                                                </td>
                                                <td>
                                                    <input type="text" name="limitDistance" th:value="${shoe.limitDistance}" class="form-control">
                                                </td>
                                                <td>
                                                    <input type="checkbox" name="hasPlate" th:checked="${shoe.hasPlate}" class="form-check-input">
                                                    <input type="hidden" name="_hasPlate" value="on">
                                                </td>
                                                <td>
                                                    <input type="text" name="memo" th:value="${shoe.memo}" class="form-control">
                                                </td>                                                   
                                            </tr>
                                        </table>
                                    </div>
                                    <div class="modal-footer">
                                        <input type="submit" th:value="保存" class="btn btn-primary">
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </td>
            </tr>
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        </tbody>
    </table>
</body>
</html>
