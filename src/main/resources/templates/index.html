<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Running Shoe Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h1 class="mb-4">🏃‍♂️ ランニングシューズ管理</h1>

    <div class="card card-body mb-4 bg-light">
        <h5>新しいシューズを登録</h5>
        <form th:action="@{/add}" method="post" class="row g-3">
            <div class="col-md-4">
                <input type="text" name="brand" class="form-control" placeholder="ブランド (例: Adidas)" required>
            </div>
            <div class="col-md-4">
                <input type="text" name="modelName" class="form-control" placeholder="モデル名 (例: Adizero SL2)" required>
            </div>
            <div class="col-md-2">
                <input type="number" step="0.1" name="totalDistance" class="form-control" placeholder="距離 (km)">
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100">登録</button>
            </div>
        </form>
    </div>

    <table class="table table-hover">
        <thead class="table-dark">
            <tr>
                <th>ブランド</th>
                <th>モデル名</th>
                <th>走行距離</th>
                <th>状態</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="shoe : ${shoes}">
                <td th:text="${shoe.brand}"></td>
                <td th:text="${shoe.modelName}"></td>
                <td th:text="${shoe.totalDistance} + ' km'"></td>
                <td th:text="${shoe.isActive} ? 'アクティブ' : '上限超過'"></td>
                <td>
                    <button class="btn btn-sm btn-outline-primary" th:data-bs-target="'#detailModal' + ${shoe.id}" data-bs-toggle="modal">
                        詳細
                    </button>
                    <div class="modal fade" th:id="'detailModal' + ${shoe.id}">
                        <div class="modal-dialog">
                            <div class="modal-content">
                                <div class="modal-body" th:text="${shoe.brand}">
                                </div>
                            </div>
                        </div>
                    </div>
                </td>
            </tr>
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        </tbody>
    </table>
</body>
</html>
