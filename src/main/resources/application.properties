# 接続先（localhost:5432 の後ろは DB名）
spring.datasource.url=jdbc:postgresql://localhost:5432/shoes_management
spring.datasource.username=user
spring.datasource.password=password

# Hibernateの設定（テーブルを自動作成する）

# none:何もしない(デフォルト)
# validate:テーブル構造を検証し、Entityと不一致があれば起動しない
# update:起動時にテーブルがなければ作成し、あれば変更点を適用
# create:起動時に既存テーブルを削除し、再作成する
# create-drop:createと同様に加え、アプリケーション終了時にテーブルを削除
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true